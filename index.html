<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aether Health</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Space+Grotesk:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              // Sanctuary Palette
              sanctuary: {
                wall: '#1C1C1E', // Warm Charcoal
                floor: '#232325', // Slightly lighter floor
                shadow: '#000000',
                light: '#E5E5EA',
                accent: '#8E8E93',
              },
              mineral: {
                500: '#64D2FF',
                900: '#30B0C7',
              },
              copper: {
                500: '#BF5AF2', 
                900: '#5E5CE6',
              },
              
              // Legacy Mappings for compatibility
              obsidian: '#1C1C1E', 
              sand: '#F2F2F7',
              
              fire: { 500: '#FF9F0A', 600: '#FF453A' },   // Warm Amber / Red
              water: { 500: '#0A84FF', 600: '#5AC8FA' },  // Blue / Cyan
              air: { 500: '#64D2FF', 600: '#BF5AF2' },    // Light Blue / Purple
              earth: { 500: '#30D158', 600: '#32ADE6' },  // Green / Teal
              space: { 500: '#D0D0D0', 600: '#8E8E93' },  // White / Gray (Structural)
            },
            animation: {
              'fade-in': 'fadeIn 1s ease-out forwards',
              'slide-up': 'slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'breathe-slow': 'breathe 8s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'hover-lift': 'lift 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'glow-pulse': 'glow 4s ease-in-out infinite',
              'wave': 'wave 1.2s ease-in-out infinite',
              'spin-slow': 'spin 12s linear infinite',
              'blob': 'blob 10s infinite',
              'shimmer': 'shimmer 2.5s infinite',
              'float': 'float 6s ease-in-out infinite',
              'flow-particle': 'flow-particle 3s linear infinite',
              'scan-line': 'scan-line 4s linear infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              breathe: {
                '0%, 100%': { opacity: '0.6', transform: 'scale(1)' },
                '50%': { opacity: '0.8', transform: 'scale(1.02)' },
              },
              lift: {
                '0%': { transform: 'translateY(0)' },
                '100%': { transform: 'translateY(-10px)' },
              },
              glow: {
                 '0%, 100%': { opacity: '0.3' },
                 '50%': { opacity: '0.6' },
              },
              wave: {
                '0%, 100%': { height: '50%' },
                '50%': { height: '100%' },
              },
              blob: {
                "0%": { transform: "translate(0px, 0px) scale(1)" },
                "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                "100%": { transform: "translate(0px, 0px) scale(1)" }
              },
              shimmer: {
                "100%": { transform: "translateX(100%)" }
              },
              float: {
                "0%, 100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-10px)" }
              },
              "flow-particle": {
                "0%": { transform: "translateY(-50px) scale(0.5)", opacity: "0" },
                "20%": { opacity: "0.5" },
                "80%": { opacity: "0.2" },
                "100%": { transform: "translateY(400px) scale(1.2)", opacity: "0" }
              },
              "scan-line": {
                "0%": { transform: "translateY(-100%)" },
                "100%": { transform: "translateY(100%)" }
              }
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
              'gradient-conic': 'conic-gradient(from 180deg at 50% 50%, var(--tw-gradient-stops))',
            },
            boxShadow: {
               'station': '0 20px 40px -10px rgba(0,0,0,0.5)',
               'station-hover': '0 30px 60px -12px rgba(0,0,0,0.6)',
               'core': '0 0 80px -20px rgba(255,255,255,0.1)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #1C1C1E;
        color: #E5E5EA;
        -webkit-font-smoothing: antialiased;
      }
      .perspective-container {
        perspective: 1200px;
      }
      .floor-gradient {
        background: radial-gradient(ellipse at center bottom, #2C2C2E 0%, #1C1C1E 70%);
      }
      .mask-image-gradient-b {
        mask-image: linear-gradient(to bottom, transparent, black 40%);
        -webkit-mask-image: linear-gradient(to bottom, transparent, black 40%);
      }
      .mask-arc {
        mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
        -webkit-mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #3A3A3C;
        border-radius: 3px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
